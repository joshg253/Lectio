name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a PR cancels the previous in-flight run for that ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        # setup-uv publishes no moving major tag; pin the exact release by SHA.
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          # Reuse the cache only when the lockfile is unchanged.
          cache-dependency-glob: uv.lock

      # Installs the interpreter pinned by .python-version / requires-python.
      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Run test suite
        # -W error::DeprecationWarning fails the build on any deprecation so they
        # surface immediately instead of accumulating silently.
        run: uv run --frozen pytest -q -W error::DeprecationWarning

      - name: Audit dependencies
        # `uv audit` (OSV-backed) is still a preview feature, so keep it
        # informational — don't gate merges on it until it stabilizes.
        continue-on-error: true
        run: uv audit --preview-features audit --frozen
